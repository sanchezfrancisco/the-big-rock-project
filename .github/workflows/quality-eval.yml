name: quality-eval

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Build index
        run: scn index .
      - name: Eval gate
        run: scn eval eval/eval_dataset.real.json --report-out reports/eval-ci.json --min-recall 0.20
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval-ci.json
